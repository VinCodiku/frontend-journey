<!DOCTYPE html>
<html lang="en">
<head>
    <!-- M E T A - D A T A -->
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="description" content="Ini adalah mini project kedua saya untuk belajar HTML, CSS, dan JavaScript.">
    <meta name="keywords" content="HTML, CSS, JavaScript, mini project, belajar coding">
    <meta name="author" content="Nama Anda">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <!-- F A V I C O N -->
    <link class="icon" rel="icon" href="favicon.ico" type="image/x-icon">

    <!-- L I N K - S C R I P T - S T Y L E -->
    <!-- l i n k - c s s -->
    <link rel="stylesheet" href="style.css">
    <!-- l i n k - f o n t s -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <!-- s c r i p t - f e a t h e r - i c o n s -->
    <script src="https://unpkg.com/feather-icons"></script>

    <!-- T I T L E - W E B S I T E -->
    <title>Second Project | Simple To-Do-List Website - VinCodiku</title>
</head>


<body>
    <!-- C O N T A I N E R -->
    <div class="container">
        <!-- h e a d e r -->
        <header>
            <i data-feather="check-circle"></i>
            <h1>Simple To-Do-List</h1>
            <p>Buat harimu lebih teratur dan produktif!</p>
        </header>
        <!-- m a i n -->
        <main>
            <!-- Form Tambah Tugas -->
            <form action="post" id="todoForm">
                <input type="text" id="todoInput" placeholder="Tambahkan tugas baru..." required>
                <button class="btn-add" type="submit">+</button>
            </form>
            <!-- List Daftar Tugas -->
            <ul id="todoList">
                <!-- Daftar tugas akan muncul di sini -->
            </ul>
        </main>
    </div>

    <!-- S C R I P T -->
    <!-- s c r i p t - f e a t h e r - i c o n s -->
    <script>
        feather.replace()
    </script>
    <!-- s c r i p t - j a v a s c r i p t -->
    <script src="script.js"></script>
</body>
</html>
